<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Carte membre — Recto</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Barlow+Condensed:wght@400;600;700&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 85.6mm; height: 54mm; background: white; }
  @page { size: 85.6mm 54mm; margin: 0; }
  @media print { html, body { width: 85.6mm; height: 54mm; } }

  .card {
    width: 85.6mm; height: 54mm;
    position: relative; overflow: hidden;
    border-radius: 3mm;
  }
  .bg {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 70% 30%, #8dd4c0 0%, #5ab8a8 35%, #3a8fa0 65%, #1a5a8a 100%);
  }
  .coast {
    position: absolute; left: 0; top: 0; bottom: 0; width: 28mm;
    background: rgba(90,160,180,0.35);
    clip-path: polygon(0 0, 75% 0, 100% 15%, 85% 30%, 95% 50%, 70% 65%, 80% 80%, 60% 100%, 0 100%);
  }
  .logo-circle {
    position: absolute; top: 3mm; left: 3mm;
    width: 16.2mm; height: 12.66mm; border-radius: 50%;
    background: white; border: 0.5mm solid rgba(255,255,255,0.7);
    display: flex; align-items: center; justify-content: center; overflow: hidden;
  }
  .logo-circle img { width: 135%; height: 135%; object-fit: contain; border-radius: 50%; transform: translateY(2px); }
  .assoc-block { position: absolute; top: 3.5mm; left: 22mm; right: 26mm; }
  .assoc-name {
    color: rgba(255,255,255,0.92); font-family: 'Barlow Condensed', sans-serif;
    font-size: 6pt; letter-spacing: 0.08em; text-transform: uppercase; line-height: 1.4;
    text-shadow: 0 0.3mm 0.8mm rgba(0,0,0,0.3);
  }
  .card-type {
    color: white; font-family: 'Barlow Condensed', sans-serif;
    font-size: 8.5pt; font-weight: 700; letter-spacing: 0.12em; margin-top: 1mm;
    text-shadow: 0 0.3mm 1mm rgba(0,0,0,0.3);
  }
  .year-badge {
    position: absolute; top: 3mm; right: 3mm;
    background: #c0392b; border: 0.4mm solid rgba(255,255,255,0.4);
    border-radius: 1.5mm; padding: 1mm 2.5mm; text-align: center; min-width: 18mm;
  }
  .year-badge-label {
    color: rgba(255,255,255,0.82); font-family: 'Barlow Condensed', sans-serif;
    font-size: 5pt; letter-spacing: 0.12em; text-transform: uppercase; display: block;
  }
  .year-badge-year {
    color: white; font-family: 'Barlow Condensed', sans-serif;
    font-size: 13pt; font-weight: 700; line-height: 1.1; display: block;
  }
  .member-block { position: absolute; bottom: 4mm; left: 3.5mm; }
  .member-label {
    color: rgba(255,255,255,0.72); font-family: 'Barlow Condensed', sans-serif;
    font-size: 5.5pt; letter-spacing: 0.12em; text-transform: uppercase;
  }
  .member-name {
    color: white; font-family: 'Playfair Display', serif;
    font-size: 13pt; font-weight: 700; margin-top: 0.5mm;
    text-shadow: 0 0.3mm 1.2mm rgba(0,0,0,0.35);
  }
  .member-num {
    color: rgba(255,255,255,0.65); font-family: 'Barlow Condensed', sans-serif;
    font-size: 5.5pt; margin-top: 0.8mm; letter-spacing: 0.06em;
  }
  .photo-zone {
    position: absolute; bottom: 4mm; right: 3.5mm;
    width: 14mm; height: 18mm;
    border: 0.4mm dashed rgba(255,255,255,0.5); border-radius: 1.5mm;
    background: rgba(255,255,255,0.12);
    display: flex; align-items: center; justify-content: center;
  }
  .photo-label {
    color: rgba(255,255,255,0.55); font-size: 4.5pt; text-align: center;
    font-family: 'Barlow Condensed', sans-serif; letter-spacing: 0.06em;
  }
</style>
</head>
